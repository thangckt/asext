name: MyST GitHub Pages Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths-ignore:
      - "1devtool/**"
      - "*.egg-info/**"
      - "dist/**"

jobs:
  build:
    name: MyST GitHub Pages deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main          # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        uses: actions/checkout@v2

      - name: Set up Python 3.11
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'

      - name: Set up Node.js (required for mystmd)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pip install mystmd

      - name: Build MyST site
        run: myst build

      - name: Create .nojekyll file
        run: touch _build/site/.nojekyll

      - name: Upload to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_build/site