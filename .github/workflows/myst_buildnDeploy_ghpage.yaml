name: MyST GitHub Pages Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths-ignore:
      - "1devtool/**"
      - "*.egg-info/**"
      - "dist/**"

jobs:
  build:
    name: MyST GitHub Pages deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main          # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
        uses: actions/checkout@v2

      - name: Set up Python 3.11
        uses: actions/setup-python@v2
        with:
          python-version: '3.11'

      - name: Set up Node.js (required for mystmd)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pip install mystmd

      - name: Build MyST site
        run: myst build --html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4