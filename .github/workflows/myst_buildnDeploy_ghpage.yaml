name: MyST GitHub Pages Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths-ignore:
      - "1devtool/**"
      - "*.egg-info/**"
      - "dist/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: MyST GitHub Pages deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v3

      - name: Set up Node.js (required for mystmd)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # - name: Set up Python 3.11
      #   uses: actions/setup-python@v2
      #   with:
      #     python-version: '3.11'

      - name: Install dependencies
        run: |
          npm install -g mystmd
          # pip install sphinx

      - name: Build MyST site
        run: myst build --html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_build/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4